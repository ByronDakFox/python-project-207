<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<title>URL</title>
</head>

<body>

<div
class="container mt-5"
data-test="url">

<h1>Información del sitio</h1>

<table class="table">

<tr>
<th>ID</th>
<td>{{ url[0] }}</td>
</tr>

<tr>
<th>Nombre</th>
<td>{{ url[1] }}</td>
</tr>

<tr>
<th>Fecha</th>
<td>{{ url[2] }}</td>
</tr>

</table>

<a
href="{{ url_for('urls') }}"
class="btn btn-secondary">
Volver
</a>

</div>

</body>
</html>
