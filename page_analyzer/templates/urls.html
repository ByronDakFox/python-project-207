<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<title>URLs</title>
</head>

<body>

<div class="container mt-5">

<h1>URLs</h1>

<table
class="table table-bordered"
data-test="urls">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Fecha</th>
</tr>
</thead>

<tbody>

{% for url in urls %}

<tr>

<td>{{ url[0] }}</td>

<td>

<a href="{{ url_for('show_url', id=url[0]) }}">
{{ url[1] }}
</a>

</td>

<td>{{ url[2] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
